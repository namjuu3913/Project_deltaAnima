<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Reminh AI Interface</title>
    <style>
        body { font-family: 'Segoe UI', 'Consolas', monospace; padding: 20px; background-color: #f4f7f6; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #333; padding-bottom: 10px; color: #2c3e50; }
        
        /* 상태 표시기 */
        #statusIndicator { font-weight: bold; margin-bottom: 15px; transition: 0.3s; }

        /* 입력 폼 스타일 */
        .input-group { margin-bottom: 20px; padding: 10px; border: 1px solid #eee; border-radius: 8px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #34495e; }
        input[type="text"] { width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px; }
        
        /* 시각화 캔버스 */
        canvas { width: 100%; height: 80px; background: #000; border-radius: 8px; margin-bottom: 10px; }

        /* 버튼 스타일 */
        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 15px; }
        #sendBtn { background-color: #007bff; color: white; }
        #startBtn { background-color: #4caf50; color: white; }
        #stopBtn { background-color: #f44336; color: white; }
        button:hover { opacity: 0.9; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        /* 로그창 스타일 */
        #messages { height: 400px; overflow-y: auto; border: 1px solid #ddd; padding: 15px; background: #fafafa; border-radius: 8px; }
        .msg { padding: 10px; margin-bottom: 10px; border-radius: 8px; line-height: 1.5; }
        .msg.user { background-color: #e3f2fd; border-left: 4px solid #2196f3; text-align: right; }
        .msg.reminh { background-color: #f1f8e9; border-left: 4px solid #4caf50; }
        .msg.system { background-color: #fff3e0; border-left: 4px solid #ff9800; font-size: 0.9em; color: #666; }
        .msg.error { background-color: #ffebee; border-left: 4px solid #f44336; color: #d32f2f; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Project deltaAnima: Reminh Orchestrator</h2>
        
        <div id="statusIndicator">🔴 Disconnected</div>

        <div class="input-group">
            <label>Voice Input:</label>
            <canvas id="visualizer"></canvas>
            <div class="btn-group">
                <button id="startBtn" onclick="startRecording()">🎤 녹음 시작</button>
                <button id="stopBtn" onclick="stopRecording()" disabled>🛑 중단 & 전송</button>
            </div>
        </div>

        <div class="input-group">
            <label>Text & Image Input:</label>
            <input type="text" id="messageText" placeholder="Reminh에게 할 말을 입력하세요..." autocomplete="off" onkeypress="handleEnter(event)"/>
            <input type="file" id="imageInput" accept="image/*" style="margin-top: 10px;"/>
        </div>

        <button onclick="sendInferenceRequest()" id="sendBtn" disabled>🚀 Send Inference Request</button>

        <div id="messages"></div>
    </div>

    <script>
        // 🚨 서버 주소 및 엔드포인트 설정 (Tailscale IP 확인 필수)
        const WS_URL = "ws://100.74.187.2:36722/ws/reminh"; 
        let ws;
        let mediaRecorder;
        let audioChunks = [];
        let audioContext;
        let animationId;

        // 웹소켓 연결
        function connect() {
            ws = new WebSocket(WS_URL);

            ws.onopen = () => {
                updateStatus(true);
                logMessage("System", "서버에 연결되었습니다.", "system");
            };

            ws.onclose = () => {
                updateStatus(false);
                logMessage("System", "서버 연결이 끊어졌습니다. (재연결 시도 중...)", "error");
                setTimeout(connect, 3000); // 3초 후 재연결 시도
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    handleResponse(data);
                } catch (e) {
                    logMessage("Error", "JSON 파싱 실패: " + event.data, "error");
                }
            };
        }

        // 서버 응답 처리
        function handleResponse(data) {
            if (data.status === 'error' || data.error) {
                logMessage("System", `Error: ${data.error}`, "error");
                return;
            }

            if (data.text || data.output_text) {
                const text = data.text || data.output_text;
                logMessage("Reminh", text, "reminh");
            }

            if (data.audio) {
                logMessage("System", "🔊 오디오 재생 중...", "system");
                const audio = new Audio("data:audio/wav;base64," + data.audio);
                audio.play().catch(e => console.error("오디오 재생 실패:", e));
            }
        }

        // 음성 녹음 시작
        async function startRecording() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
            audioChunks = [];

            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.readAsArrayBuffer(blob);
                reader.onloadend = () => {
                    const audioBytes = Array.from(new Uint8Array(reader.result));
                    sendInferenceRequest(audioBytes); // 녹음 데이터와 함께 요청 전송
                };
            };

            mediaRecorder.start();
            setupVisualizer(stream);
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            updateStatusLabel("녹음 중... 🎙️");
        }

        // 음성 녹음 중단
        function stopRecording() {
            mediaRecorder.stop();
            cancelAnimationFrame(animationId);
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            updateStatusLabel("분석 요청 중...");
        }

        // 추론 요청 전송 (텍스트, 이미지, 음성 통합)
        async function sendInferenceRequest(audioBytes = null) {
            const textInput = document.getElementById("messageText");
            const imageInput = document.getElementById("imageInput");
            
            let text = textInput.value.trim();
            let imageBase64 = null;
            let inputType = "text";
            if (audioBytes) {
                inputType = "audio";
            } else if (imageInput.files[0]) {
                inputType = text ? "text-image" : "image";
            }

            // 이미지 처리
            if (imageInput.files[0]) {
                const file = imageInput.files[0];
                const rawBase64 = await toBase64(file);
                imageBase64 = rawBase64.split(',')[1];
                if (!inputType.includes("image")) inputType.push("image");
            }

            const payload = {
                "request_type": "inference",
                "input_type": inputType, // 리스트가 아닌 문자열로 전달
                "text": text,
                "image_base64": imageBase64,
                // audioBytes가 DataURL(Base64)일 경우 처리
                "audio_bytes": audioBytes ? audioBytes.split(',')[1] : null 
            };

            ws.send(JSON.stringify(payload));
            logMessage("Me", text || (audioBytes ? "🎤 Voice Message" : "📷 Image Only"), "user");
            
            // 초기화
            textInput.value = '';
            imageInput.value = '';
        }

        // 유틸리티 함수들
        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        function setupVisualizer(stream) {
            audioContext = new AudioContext();
            const source = audioContext.createMediaStreamSource(stream);
            const analyser = audioContext.createAnalyser();
            source.connect(analyser);
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            const canvas = document.getElementById('visualizer');
            const ctx = canvas.getContext('2d');

            function draw() {
                animationId = requestAnimationFrame(draw);
                analyser.getByteFrequencyData(dataArray);
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                const barWidth = (canvas.width / bufferLength) * 2.5;
                let x = 0;
                for(let i = 0; i < bufferLength; i++) {
                    const barHeight = dataArray[i] / 2.5;
                    ctx.fillStyle = `rgb(50, ${barHeight+150}, 50)`;
                    ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                    x += barWidth + 1;
                }
            }
            draw();
        }

        function logMessage(sender, content, type) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerHTML = `<strong>${sender}:</strong> ${content}`;
            messages.prepend(div);
        }

        function updateStatus(isConnected) {
            const indicator = document.getElementById("statusIndicator");
            const btn = document.getElementById("sendBtn");
            if (isConnected) {
                indicator.innerText = "🟢 Connected";
                indicator.style.color = "green";
                btn.disabled = false;
            } else {
                indicator.innerText = "🔴 Disconnected";
                indicator.style.color = "red";
                btn.disabled = true;
            }
        }

        function updateStatusLabel(text) {
            document.getElementById('statusIndicator').innerText = "🟡 " + text;
        }

        function handleEnter(e) {
            if (e.key === 'Enter') sendInferenceRequest();
        }

        window.onload = connect;
    </script>
</body>
</html>
